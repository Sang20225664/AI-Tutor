apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-worker
  template:
    metadata:
      labels:
        app: ai-worker
    spec:
      containers:
      - name: ai-worker
        image: ai-tutor-ai-worker:latest
        imagePullPolicy: Never
        env:
        - name: MONGO_URI
          value: "mongodb://mongo:27017/ai_chat_db"
        - name: LEARNING_SERVICE_URL
          value: "http://learning:3002"
        - name: ASSESSMENT_SERVICE_URL
          value: "http://assessment:3003"
        - name: REDIS_HOST
          value: "redis"
        - name: GEMINI_API_KEY
          value: "your_gemini_api_key_here"
        - name: JWT_SECRET
          value: "your_jwt_secret_here"
        - name: NODE_ENV
          value: "production"
