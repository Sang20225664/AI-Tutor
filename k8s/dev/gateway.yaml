apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: ai-tutor-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          value: "mongodb://mongo:27017/ai_tutor_v2"
        - name: NODE_ENV
          value: "production"
        - name: HOST
          value: "0.0.0.0"
        - name: GEMINI_API_KEY
          value: "your_gemini_api_key_here"
        - name: JWT_SECRET
          value: "your_jwt_secret_here"
        - name: AUTH_SERVICE_URL
          value: "http://auth:3001"
        - name: LEARNING_SERVICE_URL
          value: "http://learning:3002"
        - name: ASSESSMENT_SERVICE_URL
          value: "http://assessment:3003"
        - name: AICHAT_SERVICE_URL
          value: "http://ai-chat:3004"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30005
