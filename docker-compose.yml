version: '3.8'

services:
  # Backend service (start first)
  backend:
    build:
      context: ./ai_tutor_backend
      dockerfile: Dockerfile
    container_name: ai_tutor_backend_main
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_started
      auth:
        condition: service_healthy
      learning:
        condition: service_healthy
      assessment:
        condition: service_healthy
    environment:
      # PHASE 2: Use clean demo database
      - MONGO_URI=mongodb://mongo:27017/ai_tutor_v2
      - NODE_ENV=production
      - HOST=0.0.0.0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth:3001
      - LEARNING_SERVICE_URL=http://learning:3002
      - ASSESSMENT_SERVICE_URL=http://assessment:3003
      - AICHAT_SERVICE_URL=http://ai-chat:3004
    networks:
      - ai_tutor_network
    restart: unless-stopped
    volumes:
      # Persist backend logs on host for easy inspection during development
      - ./logs/backend:/usr/src/app/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/api/ping" ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # Frontend service - remove health check dependency for now
  frontend:
    build:
      context: ./ai_tutor_app
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: ai_tutor_frontend_main
    ports:
      - "3000:80"
    user: "1001:1001"
    depends_on:
      - backend
    networks:
      - ai_tutor_network
    restart: unless-stopped

  # Auth microservice (first extracted service)
  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: ai_tutor_auth
    ports:
      - "3001:3001"
    depends_on:
      - mongo
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongo:27017/ai_tutor_v2
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=production
    networks:
      - ai_tutor_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # Learning microservice (second extracted service)
  learning:
    build:
      context: ./services/learning
      dockerfile: Dockerfile
    container_name: ai_tutor_learning
    ports:
      - "3002:3002"
    depends_on:
      - mongo
    environment:
      - PORT=3002
      - MONGO_URI=mongodb://mongo:27017/learning_db
      - NODE_ENV=production
    networks:
      - ai_tutor_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3002/health" ]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # Assessment microservice (third extracted service)
  assessment:
    build:
      context: ./services/assessment
      dockerfile: Dockerfile
    container_name: ai_tutor_assessment
    ports:
      - "3003:3003"
    depends_on:
      - mongo
      - learning
    environment:
      - PORT=3003
      - MONGO_URI=mongodb://mongo:27017/assessment_db
      - LEARNING_SERVICE_URL=http://learning:3002
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - NODE_ENV=production
    networks:
      - ai_tutor_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3003/health" ]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # AI/Chat microservice (fourth extracted service)
  ai-chat:
    build:
      context: ./services/ai-chat
      dockerfile: Dockerfile
    container_name: ai_tutor_aichat
    ports:
      - "3004:3004"
    depends_on:
      - mongo
      - learning
    environment:
      - PORT=3004
      - MONGO_URI=mongodb://mongo:27017/ai_chat_db
      - LEARNING_SERVICE_URL=http://learning:3002
      - ASSESSMENT_SERVICE_URL=http://assessment:3003
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - NODE_ENV=production
    networks:
      - ai_tutor_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3004/health" ]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # AI Worker microservice (Background job processor using BullMQ)
  ai-worker:
    build:
      context: ./services/ai-chat
      dockerfile: Dockerfile
    container_name: ai_tutor_ai_worker
    command: node src/workers/aiWorker.js
    depends_on:
      - mongo
      - redis
      - learning
      - assessment
    environment:
      - MONGO_URI=mongodb://mongo:27017/ai_chat_db
      - LEARNING_SERVICE_URL=http://learning:3002
      - ASSESSMENT_SERVICE_URL=http://assessment:3003
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - NODE_ENV=production
    networks:
      - ai_tutor_network
    restart: unless-stopped

  # Database service
  mongo:
    image: mongo:7
    container_name: ai_tutor_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ai_tutor_network
    command: [ "mongod", "--quiet" ]

  # Redis Cache service
  redis:
    image: redis:7-alpine
    container_name: ai_tutor_redis
    ports:
      - "6379:6379"
    networks:
      - ai_tutor_network

volumes:
  mongo_data:


networks:
  ai_tutor_network:
    driver: bridge
