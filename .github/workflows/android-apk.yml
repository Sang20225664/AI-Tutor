name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API Base URL for the mobile app'
        required: true
        default: 'https://ai-tutor-ts.duckdns.org/api'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-apk:
    name: Build & Publish APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: ./ai_tutor_app
        run: flutter pub get

      - name: Build APK
        working-directory: ./ai_tutor_app
        env:
          API_BASE_URL: ${{ inputs.api_base_url }}
        run: flutter build apk --release --dart-define=API_BASE_URL="$API_BASE_URL"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-tutor-release-apk
          path: ai_tutor_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Prepare release asset
        run: |
          mkdir -p release
          cp ai_tutor_app/build/app/outputs/flutter-apk/app-release.apk release/ai-tutor.apk

      - name: Publish APK to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: android-latest
          name: AI Tutor Android APK
          body: |
            Latest Android APK built from `${{ github.sha }}`.

            API base URL: `${{ inputs.api_base_url }}`

            Public download page: https://sang20225664.github.io/AI-Tutor/
          artifacts: release/ai-tutor.apk
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true

      - name: Prepare public download page
        run: |
          cp ai_tutor_app/build/app/outputs/flutter-apk/app-release.apk download/ai-tutor.apk

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload public download page
        uses: actions/upload-pages-artifact@v3
        with:
          path: download

      - name: Deploy public download page
        id: deployment
        uses: actions/deploy-pages@v4
