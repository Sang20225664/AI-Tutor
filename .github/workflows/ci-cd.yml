name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  AKS_CLUSTER_NAME: ai-tutor-dev-aks
  AKS_RESOURCE_GROUP: ai-tutor-dev-rg

permissions:
  id-token: write
  contents: read

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name aitutortansangdevacr

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/ai-tutor-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./ai_tutor_backend
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-backend:cache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-backend:cache,mode=max

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name aitutortansangdevacr

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/ai-tutor-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./ai_tutor_app
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-frontend:cache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-frontend:cache,mode=max

  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Inject Kubernetes Secrets
        run: |
          kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic ai-tutor-secrets \
            --from-literal=MONGO_URI="${{ secrets.MONGO_URI }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            -n dev --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to DEV namespace
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # Update images if deployments exist, skip if not yet deployed
          for svc in backend auth learning assessment ai-chat frontend; do
            if kubectl get deployment ${svc} -n dev 2>/dev/null; then
              kubectl set image deployment/${svc} \
                ${svc}=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-${svc}:${SHORT_SHA} \
                -n dev
              kubectl rollout status deployment/${svc} -n dev --timeout=300s
            else
              echo "⏭️  ${svc} not deployed yet, skipping..."
            fi
          done

  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Inject Kubernetes Secrets
        run: |
          kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic ai-tutor-secrets \
            --from-literal=MONGO_URI="${{ secrets.MONGO_URI }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            -n prod --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to PROD namespace
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # Update images if deployments exist, skip if not yet deployed
          for svc in backend auth learning assessment ai-chat frontend; do
            if kubectl get deployment ${svc} -n prod 2>/dev/null; then
              kubectl set image deployment/${svc} \
                ${svc}=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-${svc}:${SHORT_SHA} \
                -n prod
              kubectl rollout status deployment/${svc} -n prod --timeout=300s
            else
              echo "⏭️  ${svc} not deployed yet, skipping..."
            fi
          done
