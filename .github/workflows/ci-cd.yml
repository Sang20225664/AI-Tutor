name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  AKS_CLUSTER_NAME: ai-tutor-dev-aks
  AKS_RESOURCE_GROUP: ai-tutor-dev-rg

permissions:
  id-token: write
  contents: read

jobs:
  policy-checks:
    name: Policy checks (images & secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block mutable latest tags in staging/prod manifests
        run: |
          if grep -RInE "image:\s*.*:latest" k8s/staging k8s/prod; then
            echo "❌ Found ':latest' tag in staging/prod manifests. Use immutable tag (version/SHA)."
            exit 1
          fi
          echo "✅ No ':latest' tags in staging/prod manifests."

      - name: Block plaintext Kubernetes secret manifests
        run: |
          if find k8s -type f -name "*secret*.yaml" ! -name "*.template" | grep -q .; then
            echo "❌ Found tracked secret manifest (*.yaml). Commit only template files and inject secrets at deploy time."
            find k8s -type f -name "*secret*.yaml" ! -name "*.template"
            exit 1
          fi
          echo "✅ No plaintext secret manifests tracked."

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [policy-checks]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name aitutortansangdevacr

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/ai-tutor-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./ai_tutor_backend
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-backend:cache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-backend:cache,mode=max

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [policy-checks]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name aitutortansangdevacr

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/ai-tutor-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./ai_tutor_app
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-frontend:cache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-frontend:cache,mode=max

  build-services:
    name: Build Microservices
    runs-on: ubuntu-latest
    needs: [policy-checks]
    strategy:
      matrix:
        service: [auth, learning, assessment, ai-chat]
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name aitutortansangdevacr

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/ai-tutor-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-${{ matrix.service }}:cache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-${{ matrix.service }}:cache,mode=max

  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-services]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --overwrite-existing


      - name: Deploy to DEV namespace
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ROLLOUT_TIMEOUT="600s"
          FAILED_SVCS=""

          # Step 1: Update all images in parallel (fast)
          for svc in backend auth learning assessment ai-chat frontend; do
            if kubectl get deployment ${svc} -n dev &>/dev/null; then
              kubectl set image deployment/${svc} \
                ${svc}=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-${svc}:${SHORT_SHA} \
                -n dev
              echo "✅ Image updated: ${svc}"
            else
              echo "⏭️  ${svc} not deployed yet, skipping..."
            fi
          done

          # Step 2: Wait for all rollouts (sequential to get clear logs)
          for svc in backend auth learning assessment ai-chat frontend; do
            if kubectl get deployment ${svc} -n dev &>/dev/null; then
              echo "⏳ Waiting for ${svc} rollout..."
              if ! kubectl rollout status deployment/${svc} -n dev --timeout=${ROLLOUT_TIMEOUT}; then
                echo "❌ Rollout failed for ${svc} in dev. Collecting diagnostics..."
                kubectl get deployment ${svc} -n dev -o wide || true
                kubectl describe deployment ${svc} -n dev || true
                kubectl get pods -n dev -l app=${svc} -o wide || true

                NEW_POD=$(kubectl get pods -n dev -l app=${svc} --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1:].metadata.name}' 2>/dev/null || true)
                if [ -n "${NEW_POD}" ]; then
                  kubectl describe pod ${NEW_POD} -n dev || true
                  kubectl logs ${NEW_POD} -n dev --all-containers --tail=200 || true
                fi

                kubectl get events -n dev --sort-by=.metadata.creationTimestamp | tail -50 || true
                FAILED_SVCS="${FAILED_SVCS} ${svc}"
              fi
            fi
          done

          if [ -n "${FAILED_SVCS}" ]; then
            echo "❌ Failed services:${FAILED_SVCS}"
            exit 1
          fi
          echo "✅ All DEV deployments rolled out successfully."

  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-services]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --overwrite-existing


      - name: Deploy to PROD namespace
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ROLLOUT_TIMEOUT="600s"
          FAILED_SVCS=""

          # Step 1: Update all images in parallel (fast)
          for svc in backend auth learning assessment ai-chat frontend; do
            if kubectl get deployment ${svc} -n prod &>/dev/null; then
              kubectl set image deployment/${svc} \
                ${svc}=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-${svc}:${SHORT_SHA} \
                -n prod
              echo "✅ Image updated: ${svc}"
            else
              echo "⏭️  ${svc} not deployed yet, skipping..."
            fi
          done

          # Step 2: Wait for all rollouts
          for svc in backend auth learning assessment ai-chat frontend; do
            if kubectl get deployment ${svc} -n prod &>/dev/null; then
              echo "⏳ Waiting for ${svc} rollout..."
              if ! kubectl rollout status deployment/${svc} -n prod --timeout=${ROLLOUT_TIMEOUT}; then
                echo "❌ Rollout failed for ${svc} in prod. Collecting diagnostics..."
                kubectl get deployment ${svc} -n prod -o wide || true
                kubectl describe deployment ${svc} -n prod || true
                kubectl get pods -n prod -l app=${svc} -o wide || true

                NEW_POD=$(kubectl get pods -n prod -l app=${svc} --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1:].metadata.name}' 2>/dev/null || true)
                if [ -n "${NEW_POD}" ]; then
                  kubectl describe pod ${NEW_POD} -n prod || true
                  kubectl logs ${NEW_POD} -n prod --all-containers --tail=200 || true
                fi

                kubectl get events -n prod --sort-by=.metadata.creationTimestamp | tail -50 || true
                FAILED_SVCS="${FAILED_SVCS} ${svc}"
              fi
            fi
          done

          if [ -n "${FAILED_SVCS}" ]; then
            echo "❌ Failed services:${FAILED_SVCS}"
            exit 1
          fi
          echo "✅ All PROD deployments rolled out successfully."
