name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  AKS_CLUSTER_NAME: ai-tutor-dev-aks
  AKS_RESOURCE_GROUP: ai-tutor-dev-rg

permissions:
  id-token: write
  contents: write
  security-events: write

jobs:
  policy-checks:
    name: Policy checks (images & secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block mutable latest tags in staging/prod manifests
        run: |
          if grep -RInE "image:\s*.*:latest" k8s/staging k8s/prod; then
            echo "❌ Found ':latest' tag in staging/prod manifests. Use immutable tag (version/SHA)."
            exit 1
          fi
          echo "✅ No ':latest' tags in staging/prod manifests."

      - name: Block plaintext Kubernetes secret manifests
        run: |
          if find k8s -type f -name "*secret*.yaml" ! -name "*.template" | grep -q .; then
            echo "❌ Found tracked secret manifest (*.yaml). Commit only template files and inject secrets at deploy time."
            find k8s -type f -name "*secret*.yaml" ! -name "*.template"
            exit 1
          fi
          echo "✅ No plaintext secret manifests tracked."

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: [policy-checks]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — scan filesystem (dependencies)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Trivy — scan config (Dockerfiles & K8s manifests)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs.sarif'

      - name: Trivy gate — block critical filesystem vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy gate — block critical config issues
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'

  validate-backend:
    name: Validate Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './ai_tutor_backend/package-lock.json'
      - name: Install dependencies
        run: npm ci
        working-directory: ./ai_tutor_backend
      - name: Run tests if configured
        run: |
          TEST_SCRIPT=$(npm pkg get scripts.test || echo null)
          if echo "$TEST_SCRIPT" | grep -qi "no test specified"; then
            echo "No tests configured"
          else
            npm run test --if-present
          fi
        working-directory: ./ai_tutor_backend

  validate-services:
    name: Validate Microservices
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, learning, assessment, ai-chat]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './services/${{ matrix.service }}/package-lock.json'
      - name: Install dependencies
        run: npm ci
        working-directory: ./services/${{ matrix.service }}
      - name: Run tests if configured
        run: |
          TEST_SCRIPT=$(npm pkg get scripts.test || echo null)
          if echo "$TEST_SCRIPT" | grep -qi "no test specified"; then
            echo "No tests configured"
          else
            npm run test --if-present
          fi
        working-directory: ./services/${{ matrix.service }}

  validate-frontend:
    name: Validate Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
        working-directory: ./ai_tutor_app
      - name: Analyze
        run: flutter analyze --no-fatal-infos
        working-directory: ./ai_tutor_app
      - name: Test
        run: |
          if find test -type f -name '*_test.dart' 2>/dev/null | grep -q .; then
            flutter test
          else
            echo "No Flutter tests configured"
          fi
        working-directory: ./ai_tutor_app
      - name: Build Web
        run: flutter build web
        working-directory: ./ai_tutor_app

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    needs: [policy-checks, trivy-scan, validate-backend]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name aitutortansangdevacr

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/ai-tutor-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./ai_tutor_backend
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-backend:cache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-backend:cache,mode=max
          load: true

      - name: Trivy — scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/ai-tutor-backend:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'

      - name: Push Backend image
        if: github.event_name != 'pull_request'
        run: |
          echo '${{ steps.meta.outputs.tags }}' | while read -r tag; do
            [ -n "$tag" ] && docker push "$tag"
          done

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    needs: [policy-checks, trivy-scan, validate-frontend]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name aitutortansangdevacr

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/ai-tutor-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./ai_tutor_app
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-frontend:cache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-frontend:cache,mode=max
          load: true

      - name: Trivy — scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/ai-tutor-frontend:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'

      - name: Push Frontend image
        if: github.event_name != 'pull_request'
        run: |
          echo '${{ steps.meta.outputs.tags }}' | while read -r tag; do
            [ -n "$tag" ] && docker push "$tag"
          done

  build-services:
    name: Build Microservices
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    needs: [policy-checks, trivy-scan, validate-services]
    strategy:
      matrix:
        service: [auth, learning, assessment, ai-chat]
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name aitutortansangdevacr

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/ai-tutor-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-${{ matrix.service }}:cache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-${{ matrix.service }}:cache,mode=max
          load: true

      - name: Trivy — scan service image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/ai-tutor-${{ matrix.service }}:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'

      - name: Push Service image
        if: github.event_name != 'pull_request'
        run: |
          echo '${{ steps.meta.outputs.tags }}' | while read -r tag; do
            [ -n "$tag" ] && docker push "$tag"
          done

  gitops-writeback:
    name: GitOps Write-back image tag
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.actor != 'github-actions[bot]'
    needs: [build-backend, build-frontend, build-services]
    steps:
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: Sang20225664/AI-Tutor-GitOps
          token: ${{ secrets.GITOPS_PAT }}
          ref: main

      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq

      - name: Update Helm values for GitOps
        run: |
          yq -i '.global.imageTag = env(SHORT_SHA)' charts/ai-tutor/values-prod.yaml

      - name: Commit and push values update
        run: |
          git config --global user.name "github-actions-bot"
          git config --global user.email "github-actions@github.com"

          git add charts/ai-tutor/values-prod.yaml

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "ci: update imageTag to ${SHORT_SHA}"
          git push origin main

  # CD is intentionally managed by ArgoCD watching the GitOps repo.
  # This workflow builds images and writes back immutable tags to Git only.
