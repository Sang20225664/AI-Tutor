name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - 'charts/ai-tutor/values-prod.yaml'
  pull_request:
    branches: [main, dev]

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  AKS_CLUSTER_NAME: ai-tutor-dev-aks
  AKS_RESOURCE_GROUP: ai-tutor-dev-rg

permissions:
  id-token: write
  contents: write

jobs:
  policy-checks:
    name: Policy checks (images & secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block mutable latest tags in staging/prod manifests
        run: |
          if grep -RInE "image:\s*.*:latest" k8s/staging k8s/prod; then
            echo "❌ Found ':latest' tag in staging/prod manifests. Use immutable tag (version/SHA)."
            exit 1
          fi
          echo "✅ No ':latest' tags in staging/prod manifests."

      - name: Block plaintext Kubernetes secret manifests
        run: |
          if find k8s -type f -name "*secret*.yaml" ! -name "*.template" | grep -q .; then
            echo "❌ Found tracked secret manifest (*.yaml). Commit only template files and inject secrets at deploy time."
            find k8s -type f -name "*secret*.yaml" ! -name "*.template"
            exit 1
          fi
          echo "✅ No plaintext secret manifests tracked."

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    needs: [policy-checks]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name aitutortansangdevacr

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/ai-tutor-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./ai_tutor_backend
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-backend:cache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-backend:cache,mode=max

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    needs: [policy-checks]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name aitutortansangdevacr

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/ai-tutor-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./ai_tutor_app
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-frontend:cache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-frontend:cache,mode=max

  build-services:
    name: Build Microservices
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    needs: [policy-checks]
    strategy:
      matrix:
        service: [auth, learning, assessment, ai-chat]
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name aitutortansangdevacr

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/ai-tutor-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-${{ matrix.service }}:cache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/ai-tutor-${{ matrix.service }}:cache,mode=max

  gitops-writeback:
    name: GitOps Write-back image tag
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.actor != 'github-actions[bot]'
    needs: [build-backend, build-frontend, build-services]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq

      - name: Sync with latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Update Helm values for GitOps
        run: |
          yq -i '.global.imageTag = env(SHORT_SHA)' charts/ai-tutor/values-prod.yaml

      - name: Commit and push values update
        run: |
          git config --global user.name "github-actions-bot"
          git config --global user.email "github-actions@github.com"

          git add charts/ai-tutor/values-prod.yaml

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "ci: bot updated global imageTag to ${SHORT_SHA}"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push succeeded"
              exit 0
            fi

            echo "Push failed on attempt ${attempt}, rebasing and retrying..."
            git fetch origin main
            git rebase origin/main
          done

          echo "Push failed after retries"
          exit 1

  # CD is intentionally managed by ArgoCD from Git state.
  # This workflow builds images and writes back immutable tags to Git only.
