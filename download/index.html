<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Tutor Android</title>
    <meta
      name="description"
      content="Tai file cai dat Android APK moi nhat cua AI Tutor."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --surface: #ffffff;
        --text: #182230;
        --muted: #667085;
        --line: #d0d5dd;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --accent: #16a34a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        background:
          linear-gradient(135deg, rgba(37, 99, 235, 0.08), transparent 40%),
          linear-gradient(315deg, rgba(22, 163, 74, 0.08), transparent 45%),
          var(--bg);
      }

      main {
        width: min(960px, 100%);
        margin: 0 auto;
        padding: 48px 20px;
      }

      .shell {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 40px;
        align-items: center;
        min-height: calc(100vh - 96px);
      }

      .app-icon {
        width: 76px;
        height: 76px;
        border-radius: 18px;
        box-shadow: 0 18px 45px rgba(24, 34, 48, 0.18);
      }

      h1 {
        margin: 28px 0 16px;
        font-size: clamp(38px, 8vw, 72px);
        line-height: 0.98;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        max-width: 620px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.65;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 32px;
      }

      .button {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        padding: 0 18px;
        border: 1px solid transparent;
        font-weight: 700;
        text-decoration: none;
      }

      .button.primary {
        background: var(--primary);
        color: white;
      }

      .button.primary:hover {
        background: var(--primary-dark);
      }

      .button.secondary {
        border-color: var(--line);
        color: var(--text);
        background: rgba(255, 255, 255, 0.7);
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
        padding: 20px;
        box-shadow: 0 24px 60px rgba(24, 34, 48, 0.12);
      }

      .phone {
        width: 100%;
        aspect-ratio: 9 / 18;
        border: 10px solid #111827;
        border-radius: 34px;
        background: var(--surface);
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
      }

      .phone-header {
        height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 1px solid #eef2f7;
        font-weight: 700;
      }

      .bubble {
        margin: 26px 18px 0;
        padding: 14px;
        border-radius: 8px;
        color: var(--muted);
        background: #f2f4f7;
        line-height: 1.5;
      }

      .bubble.user {
        width: fit-content;
        margin-left: auto;
        color: white;
        background: var(--primary);
      }

      .status {
        margin-top: 24px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #166534;
        font-weight: 700;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
      }

      @media (max-width: 820px) {
        main {
          padding: 28px 18px;
        }

        .shell {
          grid-template-columns: 1fr;
          min-height: auto;
        }

        .panel {
          max-width: 320px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell" aria-label="Tai AI Tutor Android">
        <div>
          <img class="app-icon" src="./icon.png" alt="AI Tutor" />
          <h1>AI Tutor Android</h1>
          <p>
            Ban APK moi nhat duoc build tu GitHub Actions va ket noi den he
            thong AI Tutor dang chay tren AKS qua HTTPS.
          </p>
          <div class="actions">
            <a
              class="button primary"
              href="https://github.com/Sang20225664/AI-Tutor/releases/download/android-latest/ai-tutor.apk"
              >Tai APK</a
            >
            <a
              class="button secondary"
              href="https://github.com/Sang20225664/AI-Tutor/releases/tag/android-latest"
              >Xem release</a
            >
          </div>
          <div class="status">
            <span class="dot" aria-hidden="true"></span>
            <span>Android package</span>
          </div>
        </div>

        <div class="panel" aria-hidden="true">
          <div class="phone">
            <div class="phone-header">Chat with AI Tutor</div>
            <div class="bubble">
              Xin chao! Minh la AI Tutor, minh co the giup gi cho ban?
            </div>
            <div class="bubble user">Toi muon hoc Toan</div>
            <div class="bubble">Ban muon bat dau voi chu de nao hom nay?</div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
