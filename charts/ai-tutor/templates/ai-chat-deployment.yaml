apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-chat
  namespace: {{ .Values.global.environment }}
  labels:
    {{- include "ai-tutor.labels" . | nindent 4 }}
    app: ai-chat
spec:
  replicas: {{ index .Values "ai-chat" "replicas" }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ai-chat
  template:
    metadata:
      labels:
        app: ai-chat
    spec:
      containers:
      - name: ai-chat
        image: {{ .Values.global.imageRegistry }}/{{ index .Values "ai-chat" "image" }}:{{ .Values.global.imageTag }}
        ports:
        - containerPort: {{ index .Values "ai-chat" "port" }}
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: {{ index .Values "ai-chat" "port" | quote }}
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: ai-tutor-secrets
              key: MONGO_URI
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ai-tutor-secrets
              key: JWT_SECRET
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-tutor-secrets
              key: GEMINI_API_KEY
        - name: REDIS_URL
          value: redis://redis:6379
        resources:
          {{- toYaml (index .Values "ai-chat" "resources") | nindent 10 }}
        volumeMounts:
        {{- if .Values.keyvault.enabled }}
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true
        {{- end }}
      volumes:
      {{- if .Values.keyvault.enabled }}
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "ai-tutor-secrets"
      {{- end }}
