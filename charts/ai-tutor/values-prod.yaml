global:
  imageTag: main
  environment: prod

backend:
  replicas: 1
  env:
    NODE_ENV: production
    LOG_LEVEL: warn
    DEMO_CANARY: "true"

frontend:
  replicas: 1

auth:
  replicas: 1

learning:
  replicas: 1

assessment:
  replicas: 1

ai-chat:
  replicas: 1

ai-worker:
  replicas: 0

aiQueue:
  attempts: 4
  backoffType: exponential
  backoffDelayMs: 1500
  removeOnComplete: 300
  removeOnFail: 1000
  workerConcurrency: 2
  dlqName: ai-jobs-dlq
  dlqRetention: 5000
  dlqRemoveOnComplete: 300

ingress:
  host: "ai-tutot-ts.duckdns.org"
  clusterIssuer: "letsencrypt-prod"
  tls:
    enabled: true
    secretName: "ai-tutor-prod-tls"
