global:
  imageTag: main
  environment: prod

backend:
  replicas: 1
  env:
    NODE_ENV: production
    LOG_LEVEL: warn
    DEMO_CANARY: "true"

frontend:
  replicas: 0

auth:
  replicas: 0

learning:
  replicas: 0

assessment:
  replicas: 0

ai-chat:
  replicas: 0

ai-worker:
  replicas: 0

ingress:
  host: "ai-tutot-ts.duckdns.org"
  clusterIssuer: "letsencrypt-prod"
  tls:
    enabled: true
    secretName: "ai-tutor-prod-tls"
